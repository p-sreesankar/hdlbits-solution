name: Hardware Lint Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verilator_lint:
    runs-on: ubuntu-latest
    container:
      image: verilator/verilator:latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Execute Isolated RTL Linting
        run: |
          echo "Initiating isolated syntax evaluation with primitive linkage..."
          
          # Process each file as an independent design entity, explicitly excluding the primitive library
          for file in $(find rtl/ -type f \( -name "*.v" -o -name "*.sv" \) ! -name "hdlbits_primitives.v"); do
            echo "Scanning: $file"
            # Link the current file with the primitive definitions to satisfy structural checks
            verilator --lint-only -Wall -Wno-DECLFILENAME -Wno-EOFNEWLINE -Wno-MULTITOP "$file" rtl/hdlbits_primitives.v
          done