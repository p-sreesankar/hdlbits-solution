name: Hardware Lint Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verilator_lint:
    runs-on: ubuntu-latest
    container:
      image: verilator/verilator:latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Generate File Manifest and Execute Verilator
        run: |
          echo "Scanning all nested subdirectories for Verilog source assets..."
          
          # Find all source files and print them into a flat manifest file
          find rtl/ -type f \( -name "*.v" -o -name "*.sv" \) > files_to_lint.f
          
          echo "Manifest File Created:"
          cat files_to_lint.f
          
          # Pass the file list directly to Verilator using the standard -f flag
          verilator --lint-only -Wall -f files_to_lint.f