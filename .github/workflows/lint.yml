name: Hardware Lint Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verilator_lint:
    runs-on: ubuntu-latest
    container:
      image: verilator/verilator:latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Execute Isolated RTL Linting
        run: |
          echo "Initiating isolated syntax evaluation..."
          
          # Process each file as an independent design entity
          for file in $(find rtl/ -type f \( -name "*.v" -o -name "*.sv" \)); do
            echo "Scanning: $file"
            # Suppress specific HDLBits naming conventions, enforce all other strict rules
            verilator --lint-only -Wall -Wno-DECLFILENAME -Wno-EOFNEWLINE -Wno-MULTITOP "$file"
          done