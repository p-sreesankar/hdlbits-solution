name: Hardware Lint Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verilator_lint:
    runs-on: ubuntu-latest
    container:
      image: verilator/verilator:latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Discover and Lint All Subdirectories
        run: |
          echo "Executing recursive structural syntax scanning..."
          # Find all Verilog files in all subfolders under rtl/ and run Verilator
          find rtl/ -type f \( -name "*.v" -o -name "*.sv" \) | xargs -I {} verilator --lint-only -Wall {}